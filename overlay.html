<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Adviser · Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #080A0F;
    --bg2:          rgba(13,16,24,0.95);
    --bg3:          #12151E;
    --border:       rgba(255,255,255,0.12);
    --border2:      rgba(255,255,255,0.08);
    --accent:       #CB3CFF;
    --accent-glow:  rgba(203,60,255,0.20);
    --accent-glow2: rgba(203,60,255,0.30);
    --green:        #5CFBD8;
    --green-glow:   rgba(92,251,216,0.18);
    --red:          #FF6A7C;
    --red-glow:     rgba(255,106,124,0.18);
    --text1:        #F4F7FF;
    --text2:        #A7B1D0;
    --text3:        #6A748E;
    --mono:         'JetBrains Mono', monospace;
    --sans:         'Outfit', sans-serif;
  }

  [data-theme="light"] {
    --bg:           #F4F6FB;
    --bg2:          rgba(255,255,255,0.96);
    --bg3:          #F0F2FA;
    --border:       rgba(14,22,40,0.10);
    --border2:      rgba(14,22,40,0.06);
    --accent:       #6E33D0;
    --accent-glow:  rgba(110,51,208,0.18);
    --accent-glow2: rgba(110,51,208,0.28);
    --green:        #007A50;
    --red:          #E0253A;
    --text1:        #0E1120;
    --text2:        #4A5070;
    --text3:        #9BA3C8;
  }

  html, body {
    min-width: 0;
    width: 100%;
    background: transparent;
    overflow: hidden;
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }

  #widget {
    min-width: 0;
    width: 100%;
    max-width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 18px;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 18px 46px rgba(0,0,0,0.32),
      0 0 0 1px rgba(255,255,255,0.05),
      0 0 22px var(--accent-glow);
    animation: popIn 260ms cubic-bezier(0.34,1.4,0.64,1);
    cursor: default;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.94) translateY(10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  #widget::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent 10%, var(--accent) 50%, transparent 90%);
    z-index: 3;
  }

  #widget-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    background: rgba(8,10,15,0.85);
    cursor: grab;
    -webkit-app-region: drag;
  }

  #widget-header:active { cursor: grabbing; }

  .wh-left {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
    flex: 1;
    overflow: hidden;
  }

  .wh-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
    flex-shrink: 0;
    animation: glow-pulse 2s infinite;
  }

  @keyframes glow-pulse {
    0%, 100% { box-shadow: 0 0 6px var(--accent); }
    50%       { box-shadow: 0 0 14px var(--accent), 0 0 24px var(--accent-glow2); }
  }

  .wh-info {
    display: flex;
    align-items: center;
    gap: 10px;
    overflow: hidden;
    flex: 1;
  }

  .wh-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    color: var(--text2);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .wh-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
    -webkit-app-region: no-drag;
  }

  .wh-btn {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 1px solid var(--border2);
    background: var(--bg3);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 12px;
    line-height: 1;
    transition: background 120ms, border-color 120ms, color 120ms;
    color: var(--text2);
  }

  .wh-btn-close:hover {
    background: var(--red-glow);
    border-color: var(--red);
    color: var(--red);
  }

  #widget-body {
    padding: 18px 18px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .tasks-block {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .tasks-count-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
  }

  .tasks-count-num {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 700;
    color: var(--text1);
    line-height: 1;
    transition: color 300ms, text-shadow 300ms;
  }

  .tasks-count-num.all-done {
    color: var(--green);
    text-shadow: 0 0 14px var(--green);
  }

  .tasks-count-label {
    font-family: var(--mono);
    font-size: 8px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .tasks-divider {
    width: 1px; height: 40px;
    background: var(--border2);
    flex-shrink: 0;
  }

  .tasks-info-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .tasks-info-text {
    font-size: 11px;
    color: var(--text2);
    line-height: 1.5;
  }

  .tasks-info-text strong { color: var(--text1); font-weight: 600; }

  .tasks-prog-wrap {
    height: 4px;
    background: var(--border2);
    border-radius: 99px;
    overflow: hidden;
  }

  .tasks-prog-fill {
    height: 100%;
    background: var(--green);
    border-radius: 99px;
    transition: width 300ms ease;
  }

  .remaining-list {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .remaining-item {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 11px;
    color: var(--text2);
    display: flex;
    align-items: flex-start;
    gap: 10px;
    transition: background 120ms, border-color 120ms, color 120ms;
  }
  .remaining-item:hover { background: var(--bg2); border-color: var(--border2); color: var(--text1); }

  .remaining-dot {
    margin-top: 5px;
    width: 6px; height: 6px;
    border-radius: 50%;
    border: 1px solid var(--text3);
    flex-shrink: 0;
  }
  
  .remaining-text {
    flex: 1;
    line-height: 1.4;
  }

  #widget-footer {
    padding: 0 16px 16px;
  }

  .btn-restaurar {
    width: 100%;
    padding: 10px 0;
    background: rgba(203,60,255,0.18);
    border: 1px solid rgba(203,60,255,0.28);
    border-radius: 12px;
    color: var(--accent);
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 140ms, transform 140ms;
    -webkit-app-region: no-drag;
  }

  .btn-restaurar:hover { background: rgba(203,60,255,0.26); transform: translateY(-1px); }
</style>
</head>
<body>

<div id="widget">

  <!-- Header -->
  <div id="widget-header">
    <div class="wh-left">
      <div class="wh-dot"></div>
      <div class="wh-info">
        <span class="wh-label">Adviser · En curso</span>
      </div>
    </div>
    <div class="wh-actions">
      <button class="wh-btn wh-btn-close" onclick="cerrarOverlay()" title="Cerrar">✕</button>
    </div>
  </div>

  <!-- Cuerpo -->
  <div id="widget-body">
    <div class="tasks-block">
      <div class="tasks-count-col">
        <div class="tasks-count-num" id="ov-pendientes">-</div>
        <div class="tasks-count-label">pendientes</div>
      </div>
      <div class="tasks-divider"></div>
      <div class="tasks-info-col">
        <div class="tasks-info-text" id="ov-tasks-text">Cargando...</div>
        <div class="tasks-prog-wrap">
          <div class="tasks-prog-fill" id="ov-prog" style="width:0%"></div>
        </div>
      </div>
    </div>

    <div class="remaining-list" id="ov-remaining-list"></div>
  </div>

  <div id="widget-footer">
    <button class="btn-restaurar" onclick="restaurarApp()">↗ Volver a Adviser</button>
  </div>

</div>

<script>
  const ov = {
    hechas: 0,
    total:  0,
    tareas: [],
  };

  // ── Notifica a Python el alto real del widget para que redimensione la ventana
  function syncHeight() {
    if (isResizing) return; // No auto-ajustar mientras el usuario arrastra
    const h = document.getElementById('widget').scrollHeight;
    if (window.pywebview) {
      window.pywebview.api.overlay_set_height(h + 2); // +2 por el borde
    }
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  window.addEventListener('pywebviewready', async () => {
    const estado = await window.pywebview.api.overlay_get_estado();
    ov.hechas = estado.hechas;
    ov.total  = estado.total;
    ov.tareas = estado.tareas || [];

    if (estado.tema === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
    }

    renderOverlay();
    // Ajustar tamaño de ventana al contenido real luego de que el DOM se pinte
    requestAnimationFrame(() => requestAnimationFrame(syncHeight));
  });

  // ── Tick desde Python ─────────────────────────────────────────────────────
  window._ovTick = function(segsRestantes, hechas, total, tareas) {
    const prevPendientes = ov.total - ov.hechas;
    ov.hechas = hechas;
    ov.total  = total;
    if (tareas) ov.tareas = tareas;
    renderOverlay();

    // Resincronizar altura si cambió la cantidad de tareas pendientes
    const newPendientes = ov.total - ov.hechas;
    if (newPendientes !== prevPendientes) {
      requestAnimationFrame(() => requestAnimationFrame(syncHeight));
    }
  };

  // ── Render ────────────────────────────────────────────────────────────────
  function renderOverlay() {
    const pendientes = ov.total - ov.hechas;
    const numEl      = document.getElementById('ov-pendientes');
    numEl.textContent = pendientes;
    numEl.classList.toggle('all-done', pendientes === 0);

    document.getElementById('ov-prog').style.width =
      ov.total > 0 ? (ov.hechas / ov.total * 100) + '%' : '0%';

    document.getElementById('ov-tasks-text').innerHTML = pendientes === 0
      ? '<strong>¡Todo listo!</strong><br>Podés finalizar.'
      : `<strong>${ov.hechas}</strong> de <strong>${ov.total}</strong> completadas`;

    // Lista de tareas pendientes
    const listEl  = document.getElementById('ov-remaining-list');
    const notDone = (ov.tareas || []).filter(t => !t.done);

    if (notDone.length === 0) {
      listEl.innerHTML = '';
      listEl.style.display = 'none';
    } else {
      listEl.style.display = 'flex';
      listEl.innerHTML = notDone.map(t => `
        <div class="remaining-item">
          <div class="remaining-dot"></div>
          <div class="remaining-text">${escapeHtml(t.texto)}</div>
        </div>
      `).join('');
    }
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Cerrar / restaurar ────────────────────────────────────────────────────
  function cerrarOverlay() {
    if (window.pywebview) window.pywebview.api.overlay_cerrar();
  }

  function restaurarApp() {
    if (window.pywebview) window.pywebview.api.overlay_restaurar_app();
  }

  // ── Redimensionamiento manual ──────────────────────────────────────────────
  let isResizing = false;
  let resizeDirection = '';
  let startX, startY, startWidth, startHeight;

  // Escuchar en document para no perder el "agarre" en los bordes de la ventana
  document.addEventListener('mousemove', (e) => {
    if (isResizing) {
      let newWidth = startWidth;
      let newHeight = startHeight;

      if (resizeDirection.includes('e')) newWidth = startWidth + (e.clientX - startX);
      if (resizeDirection.includes('s')) newHeight = startHeight + (e.clientY - startY);

      if (window.pywebview) {
        window.pywebview.api.overlay_resize(Math.max(200, newWidth), Math.max(120, newHeight));
      }
      return;
    }

    // Detección de bordes basada en el tamaño de la ventana real
    const x = e.clientX;
    const y = e.clientY;
    const w = window.innerWidth;
    const h = window.innerHeight;
    const margin = 14; 

    let cursor = 'default';
    resizeDirection = '';

    const isRight = x > w - margin;
    const isBottom = y > h - margin;

    if (isRight && isBottom) {
      cursor = 'se-resize';
      resizeDirection = 'se';
    } else if (isRight) {
      cursor = 'e-resize';
      resizeDirection = 'e';
    } else if (isBottom) {
      cursor = 's-resize';
      resizeDirection = 's';
    }

    document.body.style.cursor = cursor;
    const widget = document.getElementById('widget');
    if (widget) widget.style.cursor = cursor;
  });

  document.addEventListener('mousedown', (e) => {
    if (resizeDirection) {
      isResizing = true;
      startX = e.clientX;
      startY = e.clientY;
      startWidth = window.innerWidth;
      startHeight = window.innerHeight;
      
      const header = document.getElementById('widget-header');
      if (header) header.style.webkitAppRegion = 'no-drag';
      
      e.preventDefault();
      e.stopPropagation();
    }
  });

  document.addEventListener('mouseup', () => {
    if (isResizing) {
      isResizing = false;
      resizeDirection = '';
      document.body.style.cursor = 'default';
      const widget = document.getElementById('widget');
      if (widget) widget.style.cursor = 'default';
      
      const header = document.getElementById('widget-header');
      if (header) header.style.webkitAppRegion = 'drag';
    }
  });
</script>
</body>
</html>
