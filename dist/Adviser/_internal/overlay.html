<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Adviser · Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #080A0F;
    --bg2:          #0D1018;
    --bg3:          #12151E;
    --border:       #1C2030;
    --border2:      #252B3D;
    --accent:       #e100ff;
    --accent-glow:  rgba(247, 0, 255, 0.12);
    --accent-glow2: rgba(247, 0, 255, 0.20);
    --green:        #00E5A0;
    --orange:       #FF8C42;
    --red:          #FF4458;
    --red-glow:     rgba(255,68,88,0.12);
    --text1:        #E8EBF5;
    --text2:        #6B7494;
    --text3:        #2E3450;
    --mono:         'JetBrains Mono', monospace;
    --sans:         'Outfit', sans-serif;
  }

  [data-theme="light"] {
    --bg:           #F0F2FA;
    --bg2:          #FFFFFF;
    --bg3:          #E8EBF8;
    --border:       #D0D5EE;
    --border2:      #B8BEDD;
    --accent:       #9000CC;
    --accent-glow:  rgba(144, 0, 204, 0.10);
    --accent-glow2: rgba(144, 0, 204, 0.18);
    --green:        #007A50;
    --orange:       #C05E00;
    --red:          #E0253A;
    --red-glow:     rgba(224,37,58,0.10);
    --text1:        #0E1120;
    --text2:        #4A5070;
    --text3:        #9BA3C8;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: var(--bg2);
    overflow: hidden;
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }

  /* Con frameless=False el OS dibuja la barra de título encima.
     El contenido empieza desde el borde top del área cliente. */
  #app {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    background: var(--bg2);
    overflow: hidden;
    position: relative;
  }

  /* Línea de acento superior (queda justo bajo la barra nativa) */
  #app::before {
    content: '';
    position: absolute;
    top: 0; left: 16px; right: 16px;
    height: 1.5px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    z-index: 2;
    pointer-events: none;
  }

  /* ── Barra de progreso de tiempo ────────────────────────────────────── */
  .time-bar-wrap {
    flex-shrink: 0;
    padding: 10px 14px 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .wh-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    flex-shrink: 0;
    animation: glow-pulse 2s infinite;
  }
  @keyframes glow-pulse {
    0%, 100% { box-shadow: 0 0 4px var(--accent); }
    50%       { box-shadow: 0 0 10px var(--accent), 0 0 18px var(--accent-glow2); }
  }

  .wh-time {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 700;
    color: var(--text1);
    letter-spacing: 0.05em;
    line-height: 1;
    transition: color 300ms;
  }
  .wh-time.warning { color: var(--orange); }
  .wh-time.danger  { color: var(--red); animation: blink-time 1s infinite; }
  @keyframes blink-time {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  .wh-time-label {
    font-family: var(--mono);
    font-size: 8px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    align-self: flex-end;
    padding-bottom: 2px;
  }

  /* Barra delgada de progreso de tiempo */
  .prog-time-wrap {
    flex-shrink: 0;
    padding: 6px 14px 0;
  }
  .prog-time-bg {
    height: 2px;
    background: var(--border2);
    border-radius: 99px;
    overflow: hidden;
  }
  .prog-time-fill {
    height: 100%;
    background: var(--green);
    border-radius: 99px;
    transition: width 1s linear, background 500ms;
  }
  .prog-time-fill.warning { background: var(--orange); }
  .prog-time-fill.danger  { background: var(--red); }

  /* ── Separador ──────────────────────────────────────────────────────── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 10px 14px 0;
    flex-shrink: 0;
  }

  /* ── Body scrollable ────────────────────────────────────────────────── */
  #widget-body {
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    -webkit-overflow-scrolling: touch;
  }
  #widget-body::-webkit-scrollbar { width: 3px; }
  #widget-body::-webkit-scrollbar-track { background: transparent; }
  #widget-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

  /* ── Stats row ──────────────────────────────────────────────────────── */
  .stats-row { display: flex; align-items: center; gap: 10px; }

  .stat-pill {
    display: flex;
    align-items: baseline;
    gap: 4px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    flex-shrink: 0;
  }

  .stat-num {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 700;
    color: var(--text1);
    line-height: 1;
    transition: color 300ms, text-shadow 300ms;
  }
  .stat-num.all-done { color: var(--green); text-shadow: 0 0 10px var(--green); }

  .stat-label {
    font-family: var(--mono);
    font-size: 8px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .stat-info { flex: 1; display: flex; flex-direction: column; gap: 5px; min-width: 0; }

  .stat-text {
    font-size: 11px;
    color: var(--text2);
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .stat-text strong { color: var(--text1); font-weight: 600; }

  .prog-wrap { height: 3px; background: var(--border2); border-radius: 99px; overflow: hidden; }
  .prog-fill  { height: 100%; background: var(--green); border-radius: 99px; transition: width 300ms ease; }

  /* ── Lista pendientes ───────────────────────────────────────────────── */
  .remaining-list { display: flex; flex-direction: column; gap: 4px; }

  .remaining-item {
    display: flex;
    align-items: flex-start;
    gap: 7px;
    padding: 6px 9px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 7px;
    font-size: 11px;
    color: var(--text2);
    transition: background 120ms;
    animation: slideIn 150ms ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-6px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .remaining-item:hover { background: var(--bg); border-color: var(--border2); color: var(--text1); }
  .remaining-dot { margin-top: 4px; width: 4px; height: 4px; border-radius: 50%; border: 1px solid var(--text3); flex-shrink: 0; }
  .remaining-text { flex: 1; line-height: 1.3; }

  /* ── Footer ─────────────────────────────────────────────────────────── */
  #widget-footer { padding: 0 14px 12px; flex-shrink: 0; }

  .btn-restaurar {
    width: 100%;
    padding: 8px;
    background: var(--accent-glow);
    border: 1px solid rgba(200, 0, 255, 0.25);
    border-radius: 8px;
    color: var(--accent);
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: background 140ms;
  }
  .btn-restaurar:hover { background: var(--accent-glow2); }
</style>
</head>
<body>

<div id="app">

  <!-- Tiempo + punto pulsante -->
  <div class="time-bar-wrap">
    <div class="wh-dot"></div>
    <span class="wh-time" id="ov-time">--:--</span>
    <span class="wh-time-label">restante</span>
  </div>

  <!-- Barra de progreso de tiempo -->
  <div class="prog-time-wrap">
    <div class="prog-time-bg">
      <div class="prog-time-fill" id="ov-time-prog" style="width:100%"></div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Cuerpo scrollable -->
  <div id="widget-body">
    <div class="stats-row">
      <div class="stat-pill">
        <div class="stat-num" id="ov-pendientes">-</div>
        <div class="stat-label">pend.</div>
      </div>
      <div class="stat-info">
        <div class="stat-text" id="ov-tasks-text">Cargando...</div>
        <div class="prog-wrap">
          <div class="prog-fill" id="ov-prog" style="width:0%"></div>
        </div>
      </div>
    </div>

    <div class="remaining-list" id="ov-remaining-list" style="display:none"></div>
  </div>

  <div id="widget-footer">
    <button class="btn-restaurar" onclick="restaurarApp()">↗ Volver a Adviser</button>
  </div>

</div>

<script>
  const ov = {
    segsRestantes: 0,
    segsTotal:     0,
    hechas:        0,
    total:         0,
    tareas:        [],
  };

  // ── Init ─────────────────────────────────────────────────────────────────
  window.addEventListener('pywebviewready', async () => {
    const estado = await window.pywebview.api.overlay_get_estado();
    ov.segsRestantes = estado.segs_restantes;
    ov.segsTotal     = estado.segs_total;
    ov.hechas        = estado.hechas;
    ov.total         = estado.total;
    ov.tareas        = estado.tareas || [];
    if (estado.tema === 'light') document.documentElement.setAttribute('data-theme', 'light');
    renderOverlay();
  });

  // ── Tick cada segundo desde Python ───────────────────────────────────────
  window._ovTick = function(segsRestantes, hechas, total, tareas) {
    const listaCambio = hechas !== ov.hechas || total !== ov.total ||
      (tareas && JSON.stringify(tareas) !== JSON.stringify(ov.tareas));
    ov.segsRestantes = segsRestantes;
    ov.hechas = hechas;
    ov.total  = total;
    if (tareas) ov.tareas = tareas;
    renderTiempo();
    renderContadores();
    if (listaCambio) renderLista();
  };

  // ── Render inicial completo ───────────────────────────────────────────────
  function renderOverlay() {
    renderTiempo();
    renderContadores();
    renderLista();
  }

  // Tiempo + barra de progreso
  function renderTiempo() {
    const mm = String(Math.floor(ov.segsRestantes / 60)).padStart(2, '0');
    const ss = String(ov.segsRestantes % 60).padStart(2, '0');
    const timeEl = document.getElementById('ov-time');
    timeEl.textContent = `${mm}:${ss}`;

    const progres = ov.segsTotal > 0 ? ov.segsRestantes / ov.segsTotal : 0;
    const level = progres <= 0.15 ? 'danger' : progres <= 0.35 ? 'warning' : '';
    const cls = 'wh-time' + (level ? ' ' + level : '');
    if (timeEl.className !== cls) timeEl.className = cls;

    const tpEl = document.getElementById('ov-time-prog');
    tpEl.style.width = (progres * 100) + '%';
    const tpCls = 'prog-time-fill' + (level ? ' ' + level : '');
    if (tpEl.className !== tpCls) tpEl.className = tpCls;
  }

  // Contadores
  function renderContadores() {
    const pendientes = ov.total - ov.hechas;
    const numEl = document.getElementById('ov-pendientes');
    if (numEl.textContent !== String(pendientes)) numEl.textContent = pendientes;
    numEl.classList.toggle('all-done', pendientes === 0);

    const progWidth = ov.total > 0 ? (ov.hechas / ov.total * 100) + '%' : '0%';
    const progEl = document.getElementById('ov-prog');
    if (progEl.style.width !== progWidth) progEl.style.width = progWidth;

    const pendEl = document.getElementById('ov-tasks-text');
    const html = pendientes === 0
      ? '<strong>¡Todo listo!</strong> Podés finalizar.'
      : `<strong>${ov.hechas}</strong> de <strong>${ov.total}</strong> completadas`;
    if (pendEl.innerHTML !== html) pendEl.innerHTML = html;
  }

  // Lista — solo cuando las tareas cambiaron
  function renderLista() {
    const listEl  = document.getElementById('ov-remaining-list');
    const notDone = (ov.tareas || []).filter(t => !t.done);

    if (notDone.length === 0) {
      if (listEl.style.display !== 'none') {
        listEl.style.display = 'none';
        listEl.innerHTML = '';
      }
      return;
    }

    listEl.style.display = 'flex';
    const items = listEl.querySelectorAll('.remaining-text');
    const igual = items.length === notDone.length &&
      notDone.every((t, i) => items[i].textContent === t.texto);
    if (igual) return;

    listEl.innerHTML = notDone.map(t => `
      <div class="remaining-item">
        <div class="remaining-dot"></div>
        <div class="remaining-text">${escapeHtml(t.texto)}</div>
      </div>
    `).join('');
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function cerrarOverlay() { if (window.pywebview) window.pywebview.api.overlay_cerrar(); }
  function restaurarApp()  { if (window.pywebview) window.pywebview.api.overlay_restaurar_app(); }
</script>
</body>
</html>
